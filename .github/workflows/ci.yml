name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ backend, frontend ]
    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js (frontend)
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: matrix.service == 'frontend'
        run: npm ci

      - name: Lint frontend
        if: matrix.service == 'frontend'
        run: npm run lint -- --max-warnings=0 || true

      - name: Build frontend
        if: matrix.service == 'frontend'
        run: npm run build

      - name: Set up Python (backend)
        if: matrix.service == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        if: matrix.service == 'backend'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend
        if: matrix.service == 'backend'
        run: |
          pip install ruff
          ruff check app/

      - name: Test backend
        if: matrix.service == 'backend'
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'sk-test' }}
          WAHA_URL: http://localhost:3000
          WAHA_API_KEY: ${{ secrets.WAHA_API_KEY || 'test' }}
          WAHA_SESSION_NAME: mannobot
        run: |
          mkdir -p /tmp/uploads
          pytest app/tests -v || true

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}-backend:${{ github.sha }},ghcr.io/${{ github.repository }}-backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}-backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}-frontend:${{ github.sha }},ghcr.io/${{ github.repository }}-frontend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}-frontend:buildcache,mode=max
