name: mana-app
services:
  frontend:
    image: ghcr.io/mannowell/mana-app-frontend:latest
    environment:
      - VITE_API_URL=https://mana.mannotech.duckdns.org/api
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mannobot.rule=Host(`mana.mannotech.duckdns.org`)"
      - "traefik.http.routers.mannobot.tls.certresolver=letsencrypt"
      - "traefik.http.services.mannobot.loadbalancer.server.port=80"
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure

  backend:
    image: ghcr.io/mannowell/mana-app-backend:latest
    environment:
      - DATABASE_URL=postgresql://mannobot:***@db:5432/mannobot
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - WAHA_URL=${WAHA_URL:-http://waha:3000}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_SESSION_NAME=${WAHA_SESSION_NAME:-mannobot}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    depends_on:
      - db
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mannobot-api.rule=Host(`mana.mannotech.duckdns.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.mannobot-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.mannobot-api.loadbalancer.server.port=8000"
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mannobot
      - POSTGRES_PASSWORD=mannobot
      - POSTGRES_DB=mannobot
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dokploy-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      volumes:
        pgdata:

networks:
  dokploy-network:
    external: true

volumes:
  pgdata:
